name: Build executable

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Validate fork automation
        if: github.repository == 'doveis99/Wand-Enhancer'
        shell: pwsh
        run: ./scripts/validate-fork-automation.ps1

      - name: Build unsigned executable
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - name: Upload unsigned executable
        uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-unsigned
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
